# 双低选股策略（低 PE + 低 PB）
name: dual_low
display_name: 双低选股
description: 偏稳健的低估值筛选策略，适合价值投资者
version: "1.1"
category: value
tags: [value, defensive, low_valuation]

screening:
  enabled: true
  market_scope: [cn]
  hard_filters:
    exclude_st: true
    amount_min: 50000000
    pe_ttm_max: 15
    pb_max: 2.0
    market_cap_min: 5000000000
    market_cap_max: 300000000000
    price_min: 3
    price_max: 80
  tech_weight: 0.2
  factor_weights:
    value: 0.55
    liquidity: 0.15
    stability: 0.20
    size: 0.10
  scoring_profile:
    momentum_chase_start_pct: 2.5
    activity_ideal_volume_ratio: 1.2
    activity_ideal_turnover_rate: 2.0
    stability_hot_change_pct: 4.0
  risk_profile:
    chase_change_pct: 5.0
    abnormal_volume_ratio: 4.0
    high_turnover_rate: 8.0
    low_llm_confidence: 0.45
  portfolio_profile:
    max_same_bucket: 2
    concentration_penalty: 3.0
    buckets:
      金融: [券商, 银行, 保险]
      地产链: [地产, 房地产, 建材, 家居, 物业]
      周期: [钢铁, 煤炭, 有色, 化工]
  scorecard_profile:
    value_quality_value_min: 72.0
    value_quality_stability_min: 65.0
    value_quality_bonus: 3.0
    volume_spike_ratio: 4.0
  ranking_hints: |
    优先考虑：
    1. 行业地位高、现金流质量好、分红稳定
    2. 估值处于近三年低位
    3. 无重大诉讼或监管风险
  max_output: 5
